name: Build APK Natively

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libgdbm-dev \
            libnss3-dev \
            libssl-dev \
            libreadline-dev \
            libffi-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            python3-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Install Android Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Install Compatible Buildozer Stack
        run: |
          python -m pip install --upgrade pip setuptools wheel

          pip uninstall -y buildozer python-for-android cython kivy || true

          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android==2023.09.16
          pip install kivy==2.3.0

      - name: Verify Build Tools
        run: |
          buildozer --version
          python -m pythonforandroid.toolchain --help

      - name: Clean Previous Build
        run: |
          rm -rf .buildozer
          rm -f buildozer.spec

      - name: Generate Buildozer Spec
        run: |
          buildozer init

          sed -i 's/^title = .*/title = MyMainApp/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = mymainapp/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.test/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^#source.include_exts =.*/source.include_exts = py,png,jpg,jpeg,kv,atlas/' buildozer.spec
          sed -i 's/^log_level = .*/log_level = 2/' buildozer.spec

          cat >> buildozer.spec << EOF

          android.api = 34
          android.minapi = 24
          android.sdk = 34
          android.ndk = 25b
          android.ndk_api = 24
          android.accept_sdk_license = True
          EOF

      - name: Show Buildozer Spec
        run: |
          cat buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyMainApp-APK
          path: bin/*.apk
