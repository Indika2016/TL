name: Build APK Natively
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Critical System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev python3-dev

      - name: Install Stable Buildozer and Cython
        run: |
          pip install --upgrade pip virtualenv setuptools
          pip install "cython<3.0.0" buildozer Kivy

      - name: Fresh Setup and Buildozer Configuration
        run: |
          # 1. Completely clear out old cached configurations or corrupt specs
          rm -f buildozer.spec
          rm -rf .buildozer/
          
          # 2. Generate a perfectly clean, brand new spec file
          buildozer init
          
          # 3. Configure settings carefully without disrupting file format structure
          # Set explicit requirements to stable Kivy and Python combinations
          sed -i 's/^requirements = .*/requirements = python3==3.11.9,kivy==2.3.0,sdl2,sdl2_image,sdl2_mixer,sdl2_ttf/' buildozer.spec
          
          # Auto accept the Android SDK license agreement
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # Force verbose logging so we can see inside the compilation process
          sed -i 's/^log_level = .*/log_level = 2/' buildozer.spec

      - name: Force Auto-Accept Android SDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android p4a -- get-licenses || true

      - name: Build Android APK
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BakeryApp-APK
          path: bin/*.apk
